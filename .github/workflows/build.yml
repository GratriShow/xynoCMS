- name: Upload build
  run: |
    set -euo pipefail

    FILE=$(find launcher/release -type f -name "*.dmg" | head -n 1)

    if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
      echo "❌ Aucun fichier trouvé"
      exit 1
    fi

    UUID="f6b3df0e-a41a-49ca-98ed-c42e07049bdb"
    UUID=$(echo "$UUID" | tr -d '\n\r ')

    echo "UUID DEBUG: [$UUID]"

    TOKEN="${{ secrets.XYNO_BUILD_TRIGGER_TOKEN }}"

    if [ -z "$TOKEN" ]; then
      echo "❌ TOKEN manquant"
      exit 1
    fi

    TMP=$(mktemp)

    HTTP=$(curl -sS -o "$TMP" -w "%{http_code}" -X POST "https://xynocms.xynoweb.fr/api/upload_build.php" \
      -H "X-Build-Token: ${TOKEN}" \
      -F "file=@${FILE};type=application/octet-stream" \
      -F "uuid=${UUID}" \
      -F "platform=mac" \
      || true)

    BODY=$(cat "$TMP")
    rm -f "$TMP"

    echo "HTTP: $HTTP"
    echo "BODY: $BODY"

    if [ "$HTTP" != "200" ]; then
      echo "❌ Upload failed"
      exit 1
    fi

    OK=$(echo "$BODY" | node -e '
      let s="";process.stdin.on("data",d=>s+=d);
      process.stdin.on("end",()=>{
        try {
          const j=JSON.parse(s);
          process.stdout.write(j.ok===true?"true":"false");
        } catch(e) {
          process.stdout.write("false");
        }
      });
    ')

    if [ "$OK" != "true" ]; then
      echo "❌ API error"
      exit 1
    fi

    echo "✅ Upload OK"
