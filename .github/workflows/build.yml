          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No artifact found matching ${PATTERN}"
            exit 1
          fi

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=installer" \
            -F "platform=linux" \
            -F "version=${VERSION}" \
            -F "active=1" \
            -F "file=@${FILE};type=application/octet-stream"
