name: Build Launcher

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      uuid:
        description: "Launcher UUID"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: launcher
        run: npm ci

      - name: Ensure linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true

      # ✅ FIX ICI (env ajouté)
      - name: Build launcher
        working-directory: launcher
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ✅ DEBUG cross-platform
      - name: Debug release folder
        run: |
          echo "===== RELEASE CONTENT ====="
          ls launcher/release || dir launcher/release || true
          echo "===== SEARCH FILES ====="
          find launcher/release -type f || true

      - name: Upload artifacts (GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            launcher/release/*.exe
            launcher/release/*.dmg
            launcher/release/*.AppImage
          if-no-files-found: error

      # 🔥 Upload VPS (MAC UNIQUEMENT)
      - name: Upload to VPS
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          echo "===== FIND FILE ====="
          FILE=$(find launcher/release -type f -name "*.dmg" | head -n 1)

          echo "FILE FOUND: $FILE"

          if [ ! -f "$FILE" ]; then
            echo "❌ Aucun .dmg trouvé"
            exit 1
          fi

          echo "===== UPLOAD ====="

          curl -v https://xynocms.xynoweb.fr/api/upload_build.php \
            --form "file=@${FILE}" \
            --form "uuid=${{ github.event.inputs.uuid }}" \
            --form "platform=${{ matrix.platform }}" \
            --form "token=8f7sd6f8sd6f8sd6f8sd6f"
