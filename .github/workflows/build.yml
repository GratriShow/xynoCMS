- name: Upload build
  run: |
    set -euo pipefail

    FILE=$(find launcher/release -type f -name "*.dmg" | head -n 1)

    if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
      echo "❌ Aucun fichier trouvé"
      exit 1
    fi

    UUID="f6b3df0e-a41a-49ca-98ed-c42e07049bdb"
    UUID=$(echo "$UUID" | tr -d '\n\r ')

    echo "UUID DEBUG: [$UUID]"

    TOKEN="${{ secrets.XYNO_BUILD_TRIGGER_TOKEN }}"

    TMP=$(mktemp)

    HTTP=$(curl -sS -o "$TMP" -w "%{http_code}" -X POST "https://xynocms.xynoweb.fr/api/upload_build.php" \
      -H "X-Build-Token: ${TOKEN}" \
      -F "file=@${FILE};type=application/octet-stream" \
      -F "uuid=${UUID}" \
      -F "platform=mac" \
      || true)

    BODY=$(cat "$TMP")
    rm -f "$TMP"

    echo "HTTP: $HTTP"
    echo "BODY: $BODY"

    if [ "$HTTP" != "200" ]; then
      echo "❌ Upload failed"
      exit 1
    fi

    echo "✅ Upload OK"
