name: Build Launcher

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      uuid:
        description: "Launcher UUID"
        required: true
  repository_dispatch:
    types: [ 'cms_rebuild' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: launcher
        run: npm ci

      - name: Ensure linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64 || true

      # ✅ BUILD (fix mac)
      - name: Build launcher
        working-directory: launcher
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ✅ DEBUG cross-platform
      - name: Debug release folder
        run: |
          echo "===== RELEASE CONTENT ====="
          ls launcher/release || dir launcher/release || true
          echo "===== SEARCH FILES ====="
          find launcher/release -type f || true

      # ✅ VALIDATION DMG (MAC)
      - name: Validate DMG (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail

          FILE=$(find launcher/release -type f -name "*.dmg" | head -n 1)
          echo "DMG: ${FILE}"

          if [ -z "${FILE}" ] || [ ! -f "${FILE}" ]; then
            echo "❌ Aucun .dmg trouvé"
            exit 1
          fi

          echo "sha256:"
          shasum -a 256 "${FILE}"

          echo "verify:"
          hdiutil verify "${FILE}"

      - name: Upload artifacts (GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            launcher/release/*.exe
            launcher/release/*.dmg
            launcher/release/*.AppImage
          if-no-files-found: error

      # 🚀 UPLOAD VPS (FIX FINAL)
      - name: Upload to VPS
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          set -euo pipefail

          FILE=$(find launcher/release -type f -name "*.dmg" | head -n 1)

          echo "FILE: $FILE"

          if [ ! -f "$FILE" ]; then
            echo "❌ Aucun fichier trouvé"
            exit 1
          fi

          UUID="${{ github.event.inputs.uuid }}"
          TOKEN="${{ secrets.XYNO_BUILD_TRIGGER_TOKEN }}"

          if [ -z "$UUID" ]; then
            echo "❌ UUID manquant"
            exit 1
          fi

          if [ -z "$TOKEN" ]; then
            echo "❌ TOKEN manquant"
            exit 1
          fi

          echo "UPLOAD..."

          TMP=$(mktemp)

          HTTP=$(curl -sS -o "$TMP" -w "%{http_code}" \
            "https://xynocms.xynoweb.fr/api/upload_build.php?token=${TOKEN}" \
            --form "file=@${FILE}" \
            --form "uuid=${UUID}" \
            --form "platform=${{ matrix.platform }}" || true)

          BODY=$(cat "$TMP")
          rm -f "$TMP"

          echo "HTTP: $HTTP"
          echo "BODY: $BODY"

          if [ "$HTTP" != "200" ]; then
            echo "❌ Upload failed"
            exit 1
          fi

          OK=$(echo "$BODY" | node -e '
            let s="";process.stdin.on("data",d=>s+=d);
            process.stdin.on("end",()=>{
              try {
                const j=JSON.parse(s);
                process.stdout.write(j.ok===true?"true":"false");
              } catch(e) {
                process.stdout.write("false");
              }
            });
          ')

          if [ "$OK" != "true" ]; then
            echo "❌ API error"
            exit 1
          fi

          echo "✅ Upload OK"
