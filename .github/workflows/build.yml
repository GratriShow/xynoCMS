name: Build Launcher

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        working-directory: launcher
        run: npm ci

      - name: Build launcher
        working-directory: launcher
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: Verify build
        shell: bash
        run: |
          echo "Checking dist folder..."
          ls -la launcher/dist || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            launcher/dist/*.exe
            launcher/dist/*.dmg
            launcher/dist/*.AppImage
          if-no-files-found: error
