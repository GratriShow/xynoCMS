name: Build & publish launcher

on:
  push:
    branches: [main]
    tags: ['v*']

  # Manual / VPS-triggered builds.
  workflow_dispatch:
    inputs:
      uuid:
        description: 'Launcher UUID'
        required: true
        type: string
      platform:
        description: 'Installer platform (win|mac|linux)'
        required: false
        default: 'mac'
        type: choice
        options:
          - win
          - mac
          - linux

  # Bonus: allow external triggers.
  repository_dispatch:
    types: [cms_rebuild]

permissions:
  contents: write

env:
  NODE_VERSION: '20'

jobs:
  bump_version:
    name: Bump version (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Bump patch + commit + tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cd launcher
          npm version patch -m "chore(release): v%s [skip ci]"

      - name: Push commit + tags
        run: |
          set -euo pipefail
          git push origin HEAD:main --follow-tags

  release_update_zip:
    name: Build & upload update zip (tag)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build directory (for app.asar)
        run: |
          set -euo pipefail
          cd launcher
          npx electron-builder --linux --dir

      - name: Make update zip
        run: |
          set -euo pipefail
          cd launcher
          VERSION="${GITHUB_REF_NAME#v}"
          node tools/makeUpdateZip.js --asar "release/linux-unpacked/resources/app.asar" --out "release/update-${VERSION}.zip"

      - name: Upload update zip to CMS
        run: |
          set -euo pipefail
          UUID="${{ secrets.LAUNCHER_UUID }}"
          if [ -z "$UUID" ]; then
            echo "LAUNCHER_UUID secret not set; skipping CMS upload for tag build."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          FILE="launcher/release/update-${VERSION}.zip"
          test -f "$FILE"

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=update" \
            -F "version=${VERSION}" \
            -F "required=1" \
            -F "active=1" \
            -F "file=@${FILE};type=application/zip"

  release_installers:
    name: Build & upload installers (tag)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            npm_script: build:win
            ext_glob: "*.exe"
            mime: application/octet-stream
          - os: macos-latest
            platform: mac
            npm_script: build:mac
            ext_glob: "*.dmg"
            mime: application/octet-stream
          - os: ubuntu-latest
            platform: linux
            npm_script: build:linux
            ext_glob: "*.AppImage"
            mime: application/octet-stream
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build installer
        run: |
          set -euo pipefail
          cd launcher
          npm run ${{ matrix.npm_script }}

      - name: Upload installer to CMS
        shell: bash
        run: |
          set -euo pipefail
          UUID="${{ secrets.LAUNCHER_UUID }}"
          if [ -z "$UUID" ]; then
            echo "LAUNCHER_UUID secret not set; skipping CMS upload for tag build."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"

          # Find newest matching artifact under launcher/release (portable; macOS runner uses bash 3.2)
          PATTERN="${{ matrix.ext_glob }}"
          FILE=$(PATTERN="$PATTERN" python3 - <<'PY'
import os, fnmatch
root = 'launcher/release'
pat = os.environ.get('PATTERN','')
best = ''
best_m = -1.0
for dirpath, _, filenames in os.walk(root):
    for fn in filenames:
        if pat and fnmatch.fnmatch(fn, pat):
            p = os.path.join(dirpath, fn)
            try:
                m = os.path.getmtime(p)
            except OSError:
                continue
            if m > best_m:
                best_m = m
                best = p
print(best)
PY
)
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No artifact found matching ${PATTERN}"
            exit 1
          fi

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=installer" \
            -F "platform=${{ matrix.platform }}" \
            -F "version=${VERSION}" \
            -F "active=1" \
            -F "file=@${FILE};type=${{ matrix.mime }}"

  repo_dispatch_update_zip:
    name: Rebuild & upload update zip (dispatch)
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build directory (for app.asar)
        run: |
          set -euo pipefail
          cd launcher
          npx electron-builder --linux --dir

      - name: Make update zip
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./launcher/package.json').version")
          node launcher/tools/makeUpdateZip.js --asar "launcher/release/linux-unpacked/resources/app.asar" --out "launcher/release/update-${VERSION}.zip"

      - name: Upload update zip to CMS
        run: |
          set -euo pipefail
          UUID="${{ github.event.client_payload.uuid }}"
          if [ -z "$UUID" ]; then
            echo "Missing client_payload.uuid"
            exit 1
          fi

          VERSION=$(node -p "require('./launcher/package.json').version")
          FILE="launcher/release/update-${VERSION}.zip"
          test -f "$FILE"

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=update" \
            -F "version=${VERSION}" \
            -F "required=1" \
            -F "active=1" \
            -F "file=@${FILE};type=application/zip"

  repo_dispatch_installers:
    name: Rebuild & upload installers (dispatch)
    if: github.event_name == 'repository_dispatch'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            npm_script: build:win
            ext_glob: "*.exe"
            mime: application/octet-stream
          - os: macos-latest
            platform: mac
            npm_script: build:mac
            ext_glob: "*.dmg"
            mime: application/octet-stream
          - os: ubuntu-latest
            platform: linux
            npm_script: build:linux
            ext_glob: "*.AppImage"
            mime: application/octet-stream
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build installer
        run: |
          set -euo pipefail
          cd launcher
          npm run ${{ matrix.npm_script }}

      - name: Upload installer to CMS
        run: |
          set -euo pipefail
          UUID="${{ github.event.client_payload.uuid }}"
          if [ -z "$UUID" ]; then
            echo "Missing client_payload.uuid"
            exit 1
          fi

          VERSION=$(node -p "require('./launcher/package.json').version")

          PATTERN="${{ matrix.ext_glob }}"
          FILE=$(PATTERN="$PATTERN" python3 - <<'PY'
import os, fnmatch
root = 'launcher/release'
pat = os.environ.get('PATTERN','')
best = ''
best_m = -1.0
for dirpath, _, filenames in os.walk(root):
    for fn in filenames:
        if pat and fnmatch.fnmatch(fn, pat):
            p = os.path.join(dirpath, fn)
            try:
                m = os.path.getmtime(p)
            except OSError:
                continue
            if m > best_m:
                best_m = m
                best = p
print(best)
PY
)
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No artifact found matching ${PATTERN}"
            exit 1
          fi

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=installer" \
            -F "platform=${{ matrix.platform }}" \
            -F "version=${VERSION}" \
            -F "active=1" \
            -F "file=@${FILE};type=${{ matrix.mime }}"

  dispatch_installer_mac:
    name: VPS-triggered installer (mac)
    if: github.event_name == 'workflow_dispatch' && inputs.platform == 'mac'
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build DMG
        run: |
          set -euo pipefail
          cd launcher
          npm run build:mac

      - name: Upload to CMS
        shell: bash
        run: |
          set -euo pipefail
          UUID="${{ inputs.uuid }}"
          if [ -z "$UUID" ]; then
            echo "Missing input: uuid"
            exit 1
          fi

          VERSION=$(node -e "console.log(new Date().toISOString().replace(/[-:TZ.]/g,'').slice(0,14))")

          PATTERN="*.dmg"
          FILE=$(PATTERN="$PATTERN" python3 - <<'PY'
import os, fnmatch
root = 'launcher/release'
pat = os.environ.get('PATTERN','')
best = ''
best_m = -1.0
for dirpath, _, filenames in os.walk(root):
    for fn in filenames:
        if pat and fnmatch.fnmatch(fn, pat):
            p = os.path.join(dirpath, fn)
            try:
                m = os.path.getmtime(p)
            except OSError:
                continue
            if m > best_m:
                best_m = m
                best = p
print(best)
PY
)
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No artifact found matching ${PATTERN}"
            exit 1
          fi

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=installer" \
            -F "platform=mac" \
            -F "version=${VERSION}" \
            -F "active=1" \
            -F "file=@${FILE};type=application/octet-stream"

  dispatch_installer_win:
    name: VPS-triggered installer (win)
    if: github.event_name == 'workflow_dispatch' && inputs.platform == 'win'
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build EXE
        run: |
          set -euo pipefail
          cd launcher
          npm run build:win

      - name: Upload to CMS
        shell: bash
        run: |
          set -euo pipefail
          UUID="${{ inputs.uuid }}"
          if [ -z "$UUID" ]; then
            echo "Missing input: uuid"
            exit 1
          fi

          VERSION=$(node -e "console.log(new Date().toISOString().replace(/[-:TZ.]/g,'').slice(0,14))")

          PATTERN="*.exe"
          FILE=$(PATTERN="$PATTERN" python3 - <<'PY'
import os, fnmatch
root = 'launcher/release'
pat = os.environ.get('PATTERN','')
best = ''
best_m = -1.0
for dirpath, _, filenames in os.walk(root):
    for fn in filenames:
        if pat and fnmatch.fnmatch(fn, pat):
            p = os.path.join(dirpath, fn)
            try:
                m = os.path.getmtime(p)
            except OSError:
                continue
            if m > best_m:
                best_m = m
                best = p
print(best)
PY
)
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No artifact found matching ${PATTERN}"
            exit 1
          fi

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=installer" \
            -F "platform=win" \
            -F "version=${VERSION}" \
            -F "active=1" \
            -F "file=@${FILE};type=application/octet-stream"

  dispatch_installer_linux:
    name: VPS-triggered installer (linux)
    if: github.event_name == 'workflow_dispatch' && inputs.platform == 'linux'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build AppImage
        run: |
          set -euo pipefail
          cd launcher
          npm run build:linux

      - name: Upload to CMS
        shell: bash
        run: |
          set -euo pipefail
          UUID="${{ inputs.uuid }}"
          if [ -z "$UUID" ]; then
            echo "Missing input: uuid"
            exit 1
          fi

          VERSION=$(node -e "console.log(new Date().toISOString().replace(/[-:TZ.]/g,'').slice(0,14))")

          PATTERN="*.AppImage"
          FILE=$(PATTERN="$PATTERN" python3 - <<'PY'
import os, fnmatch
root = 'launcher/release'
pat = os.environ.get('PATTERN','')
best = ''
best_m = -1.0
