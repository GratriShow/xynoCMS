name: Build Mac

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: |
          cd launcher
          npm ci

      - name: Build DMG
        run: |
          cd launcher
          npx electron-builder --mac --universal --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-mac
          path: launcher/release/*.dmg