name: Build Mac

on:
  workflow_dispatch:
    inputs:
      uuid:
        description: "Launcher UUID"
        required: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd launcher
          npm ci

      - name: Build DMG
        run: |
          cd launcher
          npx electron-builder --mac --universal --publish never

      - name: Verify build
        run: |
          FILE=$(find launcher/release -type f -name "*.dmg" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "❌ Aucun fichier dmg trouvé"
            exit 1
          fi

          echo "DMG: $FILE"
          shasum -a 256 "$FILE"
          hdiutil verify "$FILE"

      - name: Upload to API
        run: |
          FILE=$(find launcher/release -type f -name "*.dmg" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "❌ Aucun dmg"
            exit 1
          fi

          echo "UPLOAD $FILE"

          curl -X POST https://xynocms.xynoweb.fr/api/upload_build.php \
            -H "X-Build-Token: ${{ secrets.XYNO_BUILD_TRIGGER_TOKEN }}" \
            -F "file=@${FILE}" \
            -F "uuid=${{ github.event.inputs.uuid }}"