name: Build installer (dispatch)

on:
  workflow_dispatch:
    inputs:
      uuid:
        description: 'Launcher UUID'
        required: true
        type: string
      platform:
        description: 'Installer platform (win|mac|linux)'
        required: true
        default: 'mac'
        type: choice
        options:
          - win
          - mac
          - linux

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  mac:
    name: Build macOS DMG
    if: inputs.platform == 'mac'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build DMG
        run: |
          set -euo pipefail
          cd launcher
          npm run build:mac

      - name: Upload to CMS
        shell: bash
        run: |
          set -euo pipefail
          UUID="${{ inputs.uuid }}"
          if [ -z "$UUID" ]; then
            echo "Missing input: uuid"
            exit 1
          fi

          VERSION=$(python3 - <<'PY'
from datetime import datetime
print(datetime.utcnow().strftime('%Y%m%d%H%M%S'))
PY
)

          PATTERN="*.dmg"
          FILE=$(PATTERN="$PATTERN" python3 - <<'PY'
import os, fnmatch
root = 'launcher/release'
pat = os.environ.get('PATTERN','')
best = ''
best_m = -1.0
for dirpath, _, filenames in os.walk(root):
    for fn in filenames:
        if pat and fnmatch.fnmatch(fn, pat):
            p = os.path.join(dirpath, fn)
            try:
                m = os.path.getmtime(p)
            except OSError:
                continue
            if m > best_m:
                best_m = m
                best = p
print(best)
PY
)

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No artifact found matching ${PATTERN}"
            exit 1
          fi

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=installer" \
            -F "platform=mac" \
            -F "version=${VERSION}" \
            -F "active=1" \
            -F "file=@${FILE};type=application/octet-stream"

  win:
    name: Build Windows EXE
    if: inputs.platform == 'win'
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build EXE
        run: |
          set -euo pipefail
          cd launcher
          npm run build:win

      - name: Upload to CMS
        shell: bash
        run: |
          set -euo pipefail
          UUID="${{ inputs.uuid }}"
          if [ -z "$UUID" ]; then
            echo "Missing input: uuid"
            exit 1
          fi

          VERSION=$(python3 - <<'PY'
from datetime import datetime
print(datetime.utcnow().strftime('%Y%m%d%H%M%S'))
PY
)

          PATTERN="*.exe"
          FILE=$(PATTERN="$PATTERN" python3 - <<'PY'
import os, fnmatch
root = 'launcher/release'
pat = os.environ.get('PATTERN','')
best = ''
best_m = -1.0
for dirpath, _, filenames in os.walk(root):
    for fn in filenames:
        if pat and fnmatch.fnmatch(fn, pat):
            p = os.path.join(dirpath, fn)
            try:
                m = os.path.getmtime(p)
            except OSError:
                continue
            if m > best_m:
                best_m = m
                best = p
print(best)
PY
)

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No artifact found matching ${PATTERN}"
            exit 1
          fi

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=installer" \
            -F "platform=win" \
            -F "version=${VERSION}" \
            -F "active=1" \
            -F "file=@${FILE};type=application/octet-stream"

  linux:
    name: Build Linux AppImage
    if: inputs.platform == 'linux'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install deps
        run: |
          set -euo pipefail
          cd launcher
          npm ci

      - name: Build AppImage
        run: |
          set -euo pipefail
          cd launcher
          npm run build:linux

      - name: Upload to CMS
        shell: bash
        run: |
          set -euo pipefail
          UUID="${{ inputs.uuid }}"
          if [ -z "$UUID" ]; then
            echo "Missing input: uuid"
            exit 1
          fi

          VERSION=$(python3 - <<'PY'
from datetime import datetime
print(datetime.utcnow().strftime('%Y%m%d%H%M%S'))
PY
)

          PATTERN="*.AppImage"
          FILE=$(PATTERN="$PATTERN" python3 - <<'PY'
import os, fnmatch
root = 'launcher/release'
pat = os.environ.get('PATTERN','')
best = ''
best_m = -1.0
for dirpath, _, filenames in os.walk(root):
    for fn in filenames:
        if pat and fnmatch.fnmatch(fn, pat):
            p = os.path.join(dirpath, fn)
            try:
                m = os.path.getmtime(p)
            except OSError:
                continue
            if m > best_m:
                best_m = m
                best = p
print(best)
PY
)

          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "No artifact found matching ${PATTERN}"
            exit 1
          fi

          curl -sS -f -X POST "${{ secrets.CMS_BASE_URL }}/api/release_upload.php" \
            -H "X-Upload-Token: ${{ secrets.RELEASE_UPLOAD_TOKEN }}" \
            -F "uuid=${UUID}" \
            -F "type=installer" \
            -F "platform=linux" \
            -F "version=${VERSION}" \
            -F "active=1" \
            -F "file=@${FILE};type=application/octet-stream"
